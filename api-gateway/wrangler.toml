name = "api-gateway"
main = "src/index.ts"
compatibility_date = "2024-04-23"
compatibility_flags = ["nodejs_compat"]
account_id = "1ddebf6f9507d3fc9052158be9d42dee"

# Custom Domain: Creates DNS record automatically
# This points ALL paths of gateway.jsherron.com to this Worker
[[routes]]
pattern = "gateway.jsherron.com"
custom_domain = true
zone_name = "jsherron.com"

# Service binding to backend service
# Change this to point to any Worker or service
[[services]]
binding = "BACKEND"
service = "flarebin"  # Change this to your target service name

[vars]
# Logging configuration
MAX_BODY_BYTES = "400"
SIEM_STREAMING_MODE = "stream"

# Encryption (optional)
ENABLE_ENCRYPTION = "false"
ENCRYPTION_MODE = "inline"

# REQUIRED SECRETS (use `wrangler secret put`):
# SIEM_ENDPOINT = ""           # Optional - for streaming logs
# SIEM_API_KEY = ""            # Optional - auth token
# ENCRYPTION_PUBLIC_KEY = ""   # Required if ENABLE_ENCRYPTION=true

# Observability
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
